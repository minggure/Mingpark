<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ming Park - 공연 목록</title>
    <style>

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f5f6f7;
            margin: 0;
            padding: 50px 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #333;
            font-size: 28px;
        }

        #concert-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }


        .concert-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /
        .concert-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .concert-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: left;
        }

        .concert-info {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            text-align: left;
            line-height: 1.5;
        }

        .concert-price {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-top: 15px;
            margin-bottom: 15px;
            text-align: right;
        }


        .book-button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.2s;
        }
        .create-button {
            display: block;
            margin-left: 1200px;
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.2s;
        }

        .book-button:hover {
            background-color: #45a049;
        }

        .pagination-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<h2>Ming Park 공연 목록</h2>
<button class="create-button" onclick="location.href='/register.html'">공연 등록</button>

<div id="concert-container"></div>

<div id="pagination" class="pagination-container"></div>

<script>


    let currentPage = 0; // 현재 보고 있는 페이지 번호 (0부터 시작)
    const pageSize = 6;  // 한 페이지에 6개씩 끊어서 보기

    // 페이지를 불러오는 핵심 함수
    function loadConcerts(page) {
        currentPage = page;

        // 주소 뒤에 page와 size 파라미터를 붙여서 호출!
        fetch(`/api/concerts?page=${page}&size=${pageSize}`)
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('concert-container');
                container.innerHTML = ''; // 기존에 그려진 카드 싹 지우기

                // 💡 중요: 데이터가 리스트가 아니라 객체라서 data.content를 돌려야 함!
                const concerts = data.content;

                concerts.forEach(concert => {
                    const card = document.createElement('div');
                    card.className = 'concert-card';

                    card.innerHTML = `
                        <div>
                            <div class="concert-title">${concert.concertTitle}</div>
                            <div class="concert-info">📍 장소 : ${concert.place || '추후 공지'}</div>
                            <div class="concert-info">📅 날짜 : ${concert.concertDate}</div>
                            <div class="concert-info">⏰ 시간 : ${concert.concertTime}</div>
                        </div>
                        <div>
                            <div class="concert-price">₩ ${concert.concertPrice.toLocaleString()}</div>
                            <button class="book-button" onclick="location.href='/login.html'">예매하기</button>
                        </div>
                    `;
                    container.appendChild(card);
                });

                // 하단 페이지 번호 버튼 그리기 함수 호출
                renderPagination(data.totalPages);
            })
            .catch(error => console.error('에러 발생:', error));
    }

    // 하단 번호 버튼 [1] [2] [3] 만드는 로직
    function renderPagination(totalPages) {
        const pageContainer = document.getElementById('pagination');
        pageContainer.innerHTML = ''; // 기존 버튼 지우기

        // 총 페이지가 1개 이하면 페이징 버튼 안 그리기
        if (totalPages <= 1) return;

        // [이전] 버튼
        const prevBtn = document.createElement('button');
        prevBtn.className = 'page-btn';
        prevBtn.innerText = '이전';
        prevBtn.disabled = currentPage === 0;
        prevBtn.onclick = () => loadConcerts(currentPage - 1);
        pageContainer.appendChild(prevBtn);

        // 숫자 버튼들 (스프링은 0부터 시작하지만 화면엔 1부터 보여줌)
        for (let i = 0; i < totalPages; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.innerText = i + 1;
            btn.onclick = () => loadConcerts(i);
            pageContainer.appendChild(btn);
        }

        // [다음] 버튼
        const nextBtn = document.createElement('button');
        nextBtn.className = 'page-btn';
        nextBtn.innerText = '다음';
        nextBtn.disabled = currentPage === totalPages - 1;
        nextBtn.onclick = () => loadConcerts(currentPage + 1);
        pageContainer.appendChild(nextBtn);
    }

    // 처음에 메인 화면 켜지자마자 0번째 페이지 불러오기 실행!
    loadConcerts(0);
</script>

</body>
</html>
