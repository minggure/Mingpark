<div class="login-box">
    <h2>Ming Park 로그인</h2>

    <form id="loginForm">
        <div class="input-group">
            <input id="loginId" type="text" name="loginId" placeholder="아이디를 입력하세요" required>
        </div>

        <div class="input-group">
            <input id="password" type="password" name="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit">로그인</button>
    </form>

    <div class="signup-link">
        아직 회원이 아니신가요? <a href="/signup.html">회원가입 하러가기</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault(); // 페이지 전환 방지

        final data = {
            loginId: document.getElementById('loginId').value,
            password: document.getElementById('password').value
        };

        // 🌟 수정된 로그인 API 주소 적용!
        fetch('/api/v1/members/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response => {
                if (!response.ok) throw new Error('로그인 실패');
                return response.json();
            })
            .then(result => {
                if (result.status === 'success') {
                    alert(result.memberName + '님, 환영합니다!');
                    window.location.href = '/index.html'; // 메인 페이지로 부드럽게 이동
                }
            })
            .catch(error => {
                alert('로그인에 실패했습니다. 아이디와 비밀번호를 확인해 주세요.');
                console.error('Error:', error);
            });
    });
</script>
