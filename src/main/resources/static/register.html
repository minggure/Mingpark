<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ming Park - 공연 등록</title>
    <style>
        /* 밍파크 시그니처 패밀리룩 디자인 완벽 적용! */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f6f7;
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .home-logo {
            position: fixed;
            top: 18px;
            left: 28px;
            z-index: 100;
        }

        .home-logo img {
            display: block;
            width: 210px;
            height: auto;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        h2 {
            margin-bottom: 25px;
            color: #333;
        }
        .input-group {
            margin-bottom: 15px;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: inherit;
        }
        textarea { min-height: 100px; resize: vertical; }

        .paste-zone {
            padding: 22px 12px;
            border: 2px dashed #9ccc65;
            border-radius: 8px;
            background-color: #f7fbf2;
            color: #527a2d;
            cursor: pointer;
            line-height: 1.5;
        }

        .paste-zone:focus {
            border-color: #4CAF50;
            outline: none;
            background-color: #f0f8e8;
        }

        .image-preview {
            display: none;
            width: 100%;
            max-height: 300px;
            margin-top: 12px;
            border-radius: 8px;
            object-fit: contain;
        }

        .upload-status {
            margin-top: 8px;
            color: #666;
            font-size: 13px;
        }

        /* 입력창 클릭 시 테두리도 연두색으로! */
        input:focus, textarea:focus {
            border-color: #4CAF50;
            outline: none;
        }

        /* 밍파크 메인 연두색 버튼 */
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .submit-btn:hover {
            background-color: #45a049;
        }

        /* 깔끔한 취소(뒤로가기) 버튼 */
        .cancel-btn {
            width: 100%;
            padding: 12px;
            background-color: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .cancel-btn:hover {
            background-color: #d5d5d5;
        }
    </style>
</head>
<body>

<a class="home-logo" href="/main.html" aria-label="Ming Park 메인으로 이동">
    <img src="/images/mingpark-logo.png" alt="Ming Park">
</a>

<div class="login-box">
    <h2>🎤 새 공연 등록</h2>

    <div class="input-group">
        <input type="text" id="title" placeholder="공연 제목 (예: 2026 아이유 콘서트)" required>
    </div>
    <div class="input-group">
        <input type="text" id="place" placeholder="공연 장소 (예: 잠실 주경기장)" required>
    </div>
    <div class="input-group">
        <input type="date" id="date" required>
    </div>
    <div class="input-group">
        <input type="time" id="time" required>
    </div>
    <div class="input-group">
        <input type="number" id="price" placeholder="티켓 가격 (숫자만 입력)" required>
    </div>
    <div class="input-group">
        <!-- 업로드 API가 반환한 이미지 경로를 보관하고 최종 공연 등록 요청에 포함한다. -->
        <input type="hidden" id="image">
        <!-- 웹에서 이미지 복사 후 이 영역에 Ctrl+V하면 paste 이벤트가 실행된다. -->
        <div id="paste-zone" class="paste-zone" tabindex="0">
            웹에서 포스터를 이미지 복사한 뒤<br>
            여기를 누르고 Ctrl+V로 붙여넣으세요.
        </div>
        <img id="image-preview" class="image-preview" alt="붙여넣은 공연 포스터 미리보기">
        <div id="upload-status" class="upload-status">아직 붙여넣은 이미지가 없습니다.</div>
    </div>
    <div class="input-group">
        <textarea id="description" placeholder="공연 설명" required></textarea>
    </div>
    <div class="input-group">
        <label for="reservationStartAt">예매 시작 일시</label>
        <input type="datetime-local" id="reservationStartAt" required>
    </div>
    <div class="input-group">
        <label for="reservationEndAt">예매 종료 일시</label>
        <input type="datetime-local" id="reservationEndAt" required>
    </div>

    <button class="submit-btn" onclick="submitConcert()">등록하기</button>
    <button class="cancel-btn" onclick="location.href='/'">취소</button>
</div>

<script>
    const pasteZone = document.getElementById('paste-zone');
    const imageInput = document.getElementById('image');
    const imagePreview = document.getElementById('image-preview');
    const uploadStatus = document.getElementById('upload-status');

    // 붙여넣기 영역을 누르면 바로 Ctrl+V를 사용할 수 있도록 포커스를 준다.
    pasteZone.addEventListener('click', () => pasteZone.focus());

    // 웹에서 "이미지 복사"한 실제 이미지 파일을 클립보드에서 찾아 업로드한다.
    pasteZone.addEventListener('paste', event => {
        const imageItem = Array.from(event.clipboardData.items)
            .find(item => item.kind === 'file' && item.type.startsWith('image/'));

        if (!imageItem) {
            uploadStatus.textContent = '이미지 복사 후 붙여넣어 주세요. 이미지 주소 복사는 지원하지 않습니다.';
            return;
        }

        uploadImage(imageItem.getAsFile());
    });

    function uploadImage(imageFile) {
        // JSON이 아닌 실제 파일 전송이므로 multipart/form-data용 FormData를 사용한다.
        const formData = new FormData();
        formData.append('image', imageFile);
        uploadStatus.textContent = '이미지를 업로드하는 중입니다...';

        fetch('/api/concert-images', {
            method: 'POST',
            body: formData
        })
            .then(response => {
                if (!response.ok) throw new Error();
                return response.json();
            })
            .then(result => {
                // 업로드된 파일 경로를 저장해 미리보기와 최종 공연 등록 요청에서 재사용한다.
                imageInput.value = result.imageUrl;
                imagePreview.src = result.imageUrl;
                imagePreview.style.display = 'block';
                uploadStatus.textContent = '포스터 이미지가 등록되었습니다.';
            })
            .catch(() => {
                imageInput.value = '';
                imagePreview.style.display = 'none';
                uploadStatus.textContent = '이미지 업로드에 실패했습니다. JPG, PNG, GIF, WEBP 이미지를 사용해 주세요.';
            });
    }

    function submitConcert() {
        // 이미지 업로드가 완료되어 경로를 받은 뒤에만 공연 등록을 허용한다.
        if (!imageInput.value) {
            alert('공연 포스터 이미지를 복사해 붙여넣어 주세요.');
            pasteZone.focus();
            return;
        }

        // 포스터의 실제 파일 대신 서버가 반환한 /uploads/... 경로를 JSON에 담는다.
        const data = {
            concertTitle: document.getElementById('title').value,
            place: document.getElementById('place').value,
            concertDate: document.getElementById('date').value,
            concertTime: document.getElementById('time').value + ":00",
            concertPrice: document.getElementById('price').value,
            image: imageInput.value,
            description: document.getElementById('description').value,
            reservationStartAt: document.getElementById('reservationStartAt').value,
            reservationEndAt: document.getElementById('reservationEndAt').value
        };

        fetch('/api/concerts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(response => {
                if(response.ok) {
                    alert('공연이 성공적으로 등록되었습니다!');
                    location.href = '/';
                } else {
                    alert('등록 실패! 다시 시도해주세요.');
                }
            });
    }
</script>

</body>
</html>
