<div class="signup-box">
    <h2>Ming Park 회원가입</h2>
    <div class="description">쉽고 빠른 예매를 위해 회원이 되어보세요.</div>

    <form id="signupForm">
        <div class="input-group">
            <label for="name">이름</label>
            <input id="name" type="text" name="name" placeholder="이름을 입력하세요" maxlength="20" required>
        </div>

        <div class="input-group">
            <label for="loginId">아이디</label>
            <input id="loginId" type="text" name="loginId" placeholder="4자 이상 50자 이하로 입력하세요" minlength="4" maxlength="50" required>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input id="password" type="password" name="password" placeholder="8자 이상 입력하세요" minlength="8" maxlength="100" required>
        </div>

        <div class="input-group">
            <label for="email">이메일</label>
            <input id="email" type="email" name="email" placeholder="이메일을 입력하세요" maxlength="100" required>
        </div>

        <button type="submit">회원가입</button>
    </form>

    <div class="login-link">
        이미 회원이신가요? <a href="/login.html">로그인하러 가기</a>
    </div>
</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault(); // 폼 제출 시 페이지가 새로고침되는 걸 막아줘!

        // 입력된 값들 긁어모으기
        final data = {
            name: document.getElementById('name').value,
            loginId: document.getElementById('loginId').value,
            password: document.getElementById('password').value,
            email: document.getElementById('email').value
        };

        // 🌟 우리가 설계한 /api/v1/members/signup 으로 JSON 데이터 전송!
        fetch('/api/v1/members/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        })
            .then(response => response.json())
            .then(result => {
                if (result.status === 'success') {
                    alert('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
                    window.location.href = '/login.html';
                }
            })
            .catch(error => {
                // 중복이거나 검증 오류일 때 예외 처리
                alert('회원가입에 실패했습니다. 아이디 중복 혹은 입력값을 확인해 주세요.');
                console.error('Error:', error);
            });
    });
</script>
