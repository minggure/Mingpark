<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ming Park - 회원가입</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f6f7;
            margin: 0;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .signup-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 360px;
            text-align: center;
        }

        h2 {
            margin: 0 0 10px;
            color: #333;
        }

        .description {
            margin: 0 0 25px;
            color: #777;
            font-size: 13px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #555;
            font-size: 13px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #45a049;
        }

        .login-link {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }

        .login-link a {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="signup-box">
    <h2>Ming Park 회원가입</h2>
    <p class="description">회원 정보를 입력해 주세요.</p>

    <!-- 입력한 회원 정보를 MemberController의 회원가입 주소로 전송 -->
    <form action="/members/signup" method="post">
        <div class="input-group">
            <label for="name">이름</label>
            <input id="name" type="text" name="name" placeholder="이름을 입력하세요" maxlength="20" required>
        </div>

        <div class="input-group">
            <label for="loginId">아이디</label>
            <input id="loginId" type="text" name="loginId" placeholder="4자 이상 50자 이하로 입력하세요"
                   minlength="4" maxlength="50" required>
        </div>

        <div class="input-group">
            <label for="password">비밀번호</label>
            <input id="password" type="password" name="password" placeholder="8자 이상 입력하세요"
                   minlength="8" maxlength="100" required>
        </div>

        <div class="input-group">
            <label for="email">이메일</label>
            <input id="email" type="email" name="email" placeholder="이메일을 입력하세요" maxlength="100" required>
        </div>

        <button type="submit">회원가입</button>
    </form>

    <div class="login-link">
        이미 회원이신가요? <a href="/login.html">로그인하러 가기</a>
    </div>
</div>

<script>
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);

        // 회원가입 성공 시 완료 메시지를 표시하고 로그인 페이지로 이동
        if (urlParams.get('success') === 'true') {
            alert('회원가입이 완료되었습니다.');
            window.location.href = '/login.html';
        }

        // DTO 입력값 검증 실패 결과를 사용자에게 안내
        if (urlParams.get('error') === 'validation') {
            alert('입력한 회원 정보를 다시 확인해 주세요.');
        }

        // 이미 사용 중인 로그인 아이디인 경우 사용자에게 안내
        if (urlParams.get('error') === 'duplicate') {
            alert('이미 사용 중인 아이디입니다.');
        }
    };
</script>

</body>
</html>
